<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tez Kargo — Отслеживание</title>

<style>
body { font-family: Arial; background: #f2f5fb; margin: 0; padding: 0; }
.container { max-width: 500px; margin: auto; padding: 20px; }

.top-img { width: 100%; border-radius: 15px; margin-bottom: 10px; }

.box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); text-align: center; }

.logo { max-width: 180px; margin-bottom: 15px; }

h2 { color: #2b6cff; }

input, textarea, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 16px;
    box-sizing: border-box;
}

textarea { height: 70px; resize: none; }

button {
    font-weight: bold;
    border: none;
    cursor: pointer;
    border-radius: 10px;
}

.button-red { background-color: #d9534f; color: white; }

.card {
    background: linear-gradient(135deg, #4a90e2, #50e3c2);
    margin-top: 15px;
    padding: 20px;
    border-radius: 20px;
    color: white;
    text-align: left;
}

.track { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
.status { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
.date { font-size: 14px; }

.message {
    background: #dff0d8;
    color: #3c763d;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<img src="jpg.jpg" class="top-img">

<div class="box">

<img src="logo.jpg.jpg" class="logo">
<h2>📦 Tez Kargo — Отслеживание</h2>

<input id="client" placeholder="Введите клиентский код">
<textarea id="tracks" placeholder="Введите трек-коды через запятую"></textarea>

<button class="button-red" onclick="add()">➕ Добавить посылки</button>
<button class="button-red" onclick="search()">🔍 Показать мои посылки</button>
<button class="button-red" onclick="departed()">🚚 Выехавшие грузы</button>

<div id="result"></div>
<div id="departedResult"></div>

</div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycby78z_weUaCDyx66Tg-G8yK8kThx1jYc8HDQKkadr6XYGK-8XYwf7ADJY-CmpD4x7iZtQ/exec";

// ================= ADD =================
async function add(){
    const client_code = document.getElementById("client").value.trim();
    const tracks = document.getElementById("tracks").value.trim();

    if(!client_code || !tracks){
        alert("Введите данные!");
        return;
    }

    await fetch(url, {
        method: "POST",
        body: JSON.stringify({ action: "add", client_code, tracks })
    });

    alert("✅ Добавлено!");
    document.getElementById("tracks").value = "";
}

// ================= SEARCH =================
async function search(){

    const client_code = document.getElementById("client").value.trim();

    if(!client_code){
        alert("Введите клиентский код!");
        return;
    }

    const res = await fetch(url, {
        method: "POST",
        body: JSON.stringify({ action: "search", client_code })
    });

    const data = await res.json();

    let html = "";

    if(!data || data.length === 0){
        html = "<p>❌ Посылок не найдено</p>";
    } else {

        html += `<div class="message">✅ Посылки клиента: ${client_code}</div>`;

        data.forEach(p => {

            const status = (p.status || "").toLowerCase();

            let statusEmoji = "⚠️ Неизвестно";
            if(status.includes("в пути")) statusEmoji = "📍 В пути";
            if(status.includes("выдано")) statusEmoji = "✅ Выдано";
            if(status.includes("офис")) statusEmoji = "🏢 В офисе";

            html += `
            <div class="card">
                <div class="track">🆔 Трек-код: ${p.track_code || "-"}</div>
                <div class="status">Статус: ${statusEmoji}</div>
                <div class="date">📬 Дата: ${p.date || "-"}</div>
                <div class="date">📦 Ожидание: ${p.expected_date || "-"}</div>
            </div>`;
        });
    }

    document.getElementById("result").innerHTML = html;
}

// ================= DEPARTED =================
async function departed(){

    const res = await fetch(url, {
        method: "POST",
        body: JSON.stringify({ action: "departed" })
    });

    const data = await res.json();

    let html = "";

    if(!data || data.length === 0){
        html = "<p>❌ Выехавших грузов нет</p>";
    } else {

        html += `<div class="message">🚚 Выехавшие грузы</div>`;

        data.forEach(p => {

            html += `
            <div class="card">
                <div class="track">🆔 Груз: ${p.tracking_number || "-"}</div>
                <div class="status">📌 Статус: ${p.status || "-"}</div>
                <div class="date">📅 Дата выезда: ${p.departure_date || "-"}</div>
                <div class="date">📦 Ожидание: ${p.expected_arrival || "-"}</div>
            </div>`;
        });
    }

    document.getElementById("departedResult").innerHTML = html;
}
</script>

</body>
</html>﻿
