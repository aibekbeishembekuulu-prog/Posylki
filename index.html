<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tez Kargo — Отслеживание</title>

<style>
body {
    font-family: Arial;
    background: #f2f5fb;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    text-align: center;
}

h2 {
    color: #2b6cff;
}

input, textarea, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 16px;
    box-sizing: border-box;
}

textarea {
    height: 70px;
    resize: none;
}

button {
    font-weight: bold;
    border: none;
    cursor: pointer;
    background-color: #d9534f;
    color: white;
}

.card {
    background: linear-gradient(135deg, #4a90e2, #50e3c2);
    margin-top: 15px;
    padding: 20px;
    border-radius: 20px;
    color: white;
    text-align: left;
}

.track {
    font-weight: bold;
    font-size: 18px;
}

.status {
    font-weight: bold;
    margin-top: 8px;
}

.date {
    margin-top: 5px;
}

.message {
    background: #dff0d8;
    color: #3c763d;
    padding: 12px;
    border-radius: 10px;
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<div class="box">

<h2>📦 Tez Kargo — Отслеживание</h2>

<input id="client" placeholder="Введите клиентский код">
<textarea id="tracks" placeholder="Введите трек-коды через запятую"></textarea>

<button onclick="add()">➕ Добавить посылки</button>
<button onclick="search()">🔍 Показать мои посылки</button>
<button onclick="departed()">🚚 Выехавшие грузы</button>

<div id="result"></div>
<div id="departedResult"></div>

</div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycby3bRzEF6lGL4eHkHrleYEv9wMwWpoMACRUWufO7hZy_B4lFYOSoYReJDC9nkiet28pWQ/exec";

// ================= ADD =================
async function add(){
    try {
        const client_code = document.getElementById("client").value.trim();
        const tracks = document.getElementById("tracks").value.trim();

        if(!client_code || !tracks){
            alert("Введите данные!");
            return;
        }

        const res = await fetch(url,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                action:"add",
                client_code,
                tracks
            })
        });

        const data = await res.json();

        alert("✅ Добавлено");
        console.log(data);

    } catch(err){
        alert("Ошибка: " + err);
    }
}

// ================= SEARCH =================
async function search(){
    try {
        const client_code = document.getElementById("client").value.trim();

        if(!client_code){
            alert("Введите клиентский код");
            return;
        }

        const res = await fetch(url,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                action:"search",
                client_code
            })
        });

        const data = await res.json();

        let html = "";

        if(!data.length){
            html = "<div class='message'>❌ Посылки не найдены</div>";
        } else {

            html += `<div class="message">📦 Посылки клиента: ${client_code}</div>`;

            data.forEach(p => {

                html += `
                <div class="card">
                    <div class="track">🆔 ${p.track_code}</div>
                    <div class="status">📌 ${p.status}</div>
                    <div class="date">📅 Дата: ${p.date}</div>
                    <div class="date">⏳ Ожидается: ${p.expected_date}</div>
                </div>
                `;
            });
        }

        document.getElementById("result").innerHTML = html;

    } catch(err){
        alert("Ошибка: " + err);
    }
}

// ================= DEPARTED =================
async function departed(){
    try {

        const res = await fetch(url,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                action:"departed"
            })
        });

        const data = await res.json();

        let html = "";

        if(!data.length){
            html = "<div class='message'>❌ Нет выехавших грузов</div>";
        } else {

            html += `<div class="message">🚚 Выехавшие грузы</div>`;

            data.forEach(p => {
                html += `
                <div class="card">
                    <div class="track">🆔 ${p.tracking_number}</div>
                    <div class="status">📌 ${p.status}</div>
                    <div class="date">📅 Выезд: ${p.departure_date}</div>
                    <div class="date">⏳ Ожидается: ${p.expected_arrival_date}</div>
                </div>
                `;
            });
        }

        document.getElementById("departedResult").innerHTML = html;

    } catch(err){
        alert("Ошибка: " + err);
    }
}
</script>

</body>
</html>
