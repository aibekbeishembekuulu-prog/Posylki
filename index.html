<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tez Kargo — Мобильное отслеживание</title>

<style>
body {
    font-family: Arial;
    background: #f2f5fb;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

.top-img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 10px;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    text-align: center;
    margin-top: 20px;
}

.logo {
    max-width: 180px;
    margin-bottom: 15px;
}

h2 {
    color: #2b6cff;
    margin-bottom: 15px;
}

input,
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 16px;
    box-sizing: border-box;
}

button {
    font-weight: bold;
    border: none;
    cursor: pointer;
    background-color: #d9534f;
    color: white;
}

.card {
    background: linear-gradient(135deg, #4a90e2, #50e3c2);
    margin-top: 15px;
    padding: 20px;
    border-radius: 20px;
    color: white;
    text-align: left;
}

.track {
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 5px;
}

.status {
    font-weight: bold;
    font-size: 16px;
    margin-bottom: 5px;
}

.date {
    font-size: 14px;
}

.message {
    background: #dff0d8;
    color: #3c763d;
    padding: 12px 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<img src="jpg.jpg" class="top-img">

<div class="box">

<img src="logo.jpg.jpg" alt="Tez Kargo" class="logo">

<h2>📦 Tez Kargo — Отслеживание посылок</h2>

<input id="client" placeholder="Введите клиентский код">

<button onclick="search()">
🔍 Показать мои посылки
</button>

<div id="result"></div>

</div>
</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbyWxhTjr99IKcHubVsLSlRYIy8EGNvS4TMpn4meNCS1oeaxzzYi1Csyo3Mli8fwwawO/exec";

// 🔥 универсальная функция поиска значений
function getValue(obj, keys, fallback = "-") {
    for (let k of keys) {
        if (obj && obj[k] !== undefined && obj[k] !== null && obj[k] !== "") {
            return obj[k];
        }
    }
    return fallback;
}

// 🔥 формат даты ДД-ММ-ГГГГ
function formatDateDMY(dateStr) {
    if (!dateStr) return "-";

    if (dateStr.includes("-") && dateStr.split("-")[0].length === 2) {
        return dateStr;
    }

    let parts = dateStr.includes(".") ? dateStr.split(".") : dateStr.split("-");

    if (parts.length !== 3) return dateStr;

    let year = parts[0];
    let month = parts[1];
    let day = parts[2];

    return `${day}-${month}-${year}`;
}

async function search(){

    const client_code = document.getElementById("client").value.trim();

    if(!client_code){
        alert("Введите клиентский код!");
        return;
    }

    const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            action: "search",
            client_code
        })
    });

    const data = await res.json();

    let html = "";

    if(!data || data.length === 0){
        html = "<p>❌ Посылок не найдено</p>";
    } else {

        html += `
        <div class="message">
            ✅ Найдены посылки по клиентскому коду: ${client_code}
        </div>`;

        data.forEach(p => {

            const statusRaw = (p.status || "").toLowerCase();

            let statusEmoji = "⚠️ Неизвестно";

            if(statusRaw.includes("склад") && statusRaw.includes("китай")){
                statusEmoji = "🇨🇳 На складе в Китае";
            }
            else if(statusRaw.includes("в пути")){
                statusEmoji = "🚚 В пути";
            }
            else if(statusRaw.includes("офис")){
                statusEmoji = "🏢 В офисе";
            }
            else if(statusRaw.includes("выдано")){
                statusEmoji = "✅ Выдано";
            }

            const sendDate = getValue(p, ["date", "Date", "send_date", "sendDate"]);

            const expectedDateRaw = getValue(p, ["expected_date", "expectedDate", "EXPECTED_DATE", "planned_date"]);
            const expectedDate = formatDateDMY(expectedDateRaw);

            html += `
            <div class="card">

                <div class="track">
                    🆔 Трек-код: ${p.track || "-"}
                </div>

                <div class="status">
                    Статус: ${statusEmoji}
                </div>

                <div class="date">
                    📬 Дата отправки: ${sendDate}
                </div>

                <div class="date">
                    📦 Ожидаемое поступление: ${expectedDate}
                </div>

            </div>`;
        });
    }

    document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
